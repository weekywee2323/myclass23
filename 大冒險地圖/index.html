<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歷史國文大冒險 - 闖關大地圖</title>
    <meta name="description" content="將朝代配對、成語填字、打怪 RPG 串接成完整冒險。具備跨頁憑證讀取、拖曳插槽解鎖大門、冒險計時與過關統計。">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700;900&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #07040e;
            --bg-panel: rgba(20, 15, 38, 0.85);
            --border-gold: #d4af37;
            --pastel-pink: #fbcfe8;
            --pastel-blue: #a5f3fc;
            --pastel-purple: #e9d5ff;
            --neon-blue: #00f0ff;
            --neon-pink: #ff007f;
            --neon-green: #39ff14;
            --neon-yellow: #ffea00;
            --font-classical: 'Noto Serif TC', serif;
            --font-game: 'Outfit', sans-serif;
            --shadow-glow: 0 0 20px rgba(0, 240, 255, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-classical);
            background-color: var(--bg-dark);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 0, 127, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 240, 255, 0.05) 0%, transparent 40%),
                repeating-linear-gradient(45deg, rgba(212, 175, 55, 0.01) 0px, rgba(212, 175, 55, 0.01) 2px, transparent 2px, transparent 8px);
            padding: 1.5rem;
        }

        /* 大地圖卡片框架 */
        .map-cabinet {
            background: var(--bg-panel);
            border: 4px solid var(--border-gold);
            border-radius: 28px;
            width: 100%;
            max-width: 520px;
            padding: 2rem 1.8rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(212, 175, 55, 0.15);
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
            position: relative;
        }

        /* 標題與重置區 */
        .map-header {
            text-align: center;
            border-bottom: 2px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 1.2rem;
            position: relative;
        }

        .map-header h1 {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--pastel-pink) 0%, var(--pastel-purple) 50%, var(--pastel-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(233, 213, 255, 0.2);
        }

        .map-header p {
            font-size: 0.9rem;
            color: var(--pastel-purple);
            margin-top: 0.4rem;
            letter-spacing: 1px;
        }

        .reset-btn {
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(255, 0, 127, 0.1);
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .reset-btn:hover {
            background: var(--neon-pink);
            color: #07040e;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.4);
        }

        /* 關卡卡片網格 */
        .stages-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .stage-card {
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .stage-card:hover {
            transform: translateX(6px);
            border-color: var(--neon-blue);
            background: rgba(0, 240, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
        }

        /* 已完成關卡狀態 */
        .stage-card.completed {
            border-color: var(--neon-green);
            background: rgba(57, 255, 20, 0.04);
        }
        .stage-card.completed:hover {
            background: rgba(57, 255, 20, 0.08);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.15);
        }

        .stage-info {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .stage-emoji {
            font-size: 2.2rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .stage-details h3 {
            font-size: 1.15rem;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .stage-details p {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 0.2rem;
        }

        .stage-status {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #94a3b8;
        }

        .stage-card.completed .stage-status {
            background: rgba(57, 255, 20, 0.15);
            border-color: var(--neon-green);
            color: var(--neon-green);
            box-shadow: 0 0 8px rgba(57, 255, 20, 0.2);
        }

        /* 底部通關大門按鈕列 */
        .gate-action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            margin-top: 0.5rem;
            border-top: 1px dashed rgba(212, 175, 55, 0.2);
            padding-top: 1.5rem;
        }

        .gate-btn {
            font-family: var(--font-classical);
            background: linear-gradient(135deg, var(--border-gold) 0%, #b8901c 100%);
            color: #07040e;
            border: 2px solid #ffffff;
            width: 100%;
            padding: 1rem 2rem;
            border-radius: 99px;
            font-size: 1.25rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
            transition: all 0.2s ease;
            letter-spacing: 2px;
            text-align: center;
        }

        .gate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5);
        }

        .gate-btn:active {
            transform: translateY(2px);
        }

        .cert-summary {
            font-size: 0.85rem;
            color: var(--pastel-purple);
            font-weight: 700;
        }

        /* 通關大門 Modal 覆蓋層 */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(12, 8, 25, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            z-index: 100;
            display: none;
            flex-direction: column;
            padding: 1.8rem;
            animation: fadeIn 0.3s ease forwards;
            justify-content: space-between;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-header {
            text-align: center;
            border-bottom: 2px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 0.8rem;
            position: relative;
        }

        .modal-header h2 {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--border-gold);
            letter-spacing: 2px;
        }

        .modal-close-btn {
            position: absolute;
            top: 0;
            right: 0;
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* 憑證插槽區（上半部） */
        .slots-area {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 1.2rem 0;
        }

        .slot-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .slot-label {
            font-size: 0.8rem;
            color: var(--pastel-purple);
            font-weight: 700;
        }

        /* 石座凹槽 */
        .socket {
            width: 80px;
            height: 80px;
            background: #080512;
            border: 3px solid #332549;
            border-radius: 50%;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.8);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .socket.dragover {
            border-color: var(--neon-blue);
            box-shadow: inset 0 0 15px rgba(0, 240, 255, 0.4);
        }

        .socket.correct-snap {
            border-color: var(--neon-green);
            background: rgba(57, 255, 20, 0.05);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
        }

        /* 背包區（下半部） */
        .backpack-section {
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid rgba(212, 175, 55, 0.15);
            border-radius: 18px;
            padding: 1rem;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .backpack-title {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 700;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 4px;
        }

        .badge-pool {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            flex: 1;
            align-items: center;
        }

        /* 憑證徽章 */
        .cert-badge {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2b1c4c 0%, #150f2b 100%);
            border: 2px solid var(--border-gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: grab;
            box-shadow: 0 5px 10px rgba(0,0,0,0.4);
            position: relative;
            z-index: 100;
            transition: transform 0.15s ease;
            touch-action: none; /* 僅在徽章上禁用觸控手勢，防止拖曳時頁面滾動 */
        }

        .cert-badge:active {
            cursor: grabbing;
        }

        .cert-badge.dragging {
            opacity: 0.85;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            transform: scale(1.15);
            border-color: var(--neon-blue);
        }

        .cert-emoji {
            font-size: 1.4rem;
        }

        .cert-name {
            font-size: 0.55rem;
            color: var(--pastel-pink);
            font-weight: 900;
            margin-top: 1px;
        }

        /* 徽章鎖定插在槽內後的狀態 */
        .cert-badge.snapped {
            width: 100%;
            height: 100%;
            border-width: 0;
            background: transparent;
            box-shadow: none;
            cursor: default;
        }
        
        .cert-badge.snapped .cert-name {
            color: var(--neon-green);
        }

        /* 紅閃警告 */
        .socket.error-flash {
            animation: flashRed 0.25s ease-out 2;
        }

        @keyframes flashRed {
            0%, 100% { border-color: #332549; }
            50% { border-color: #ef4444; background: rgba(239, 68, 68, 0.15); }
        }

        /* 冒險過關畫面 */
        .clear-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(7, 4, 14, 0.98);
            border-radius: 24px;
            z-index: 150;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem;
            text-align: center;
            animation: fadeIn 0.4s ease forwards;
        }

        .clear-title {
            font-size: 2.3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--neon-yellow) 0%, var(--neon-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
            letter-spacing: 2px;
            transform: rotate(-1deg);
        }

        .summary-card {
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 1.5rem 2.5rem;
            width: 85%;
            box-shadow: var(--shadow-glow);
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
        }

        .summary-val {
            font-family: var(--font-game);
            font-weight: bold;
            color: var(--neon-blue);
            font-size: 1.15rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="map-cabinet" id="mapCabinet">
        <!-- 頂部標頭 -->
        <div class="map-header">
            <button class="reset-btn" id="resetBtn">🔄 清除進度</button>
            <h1>大冒險地圖</h1>
            <p>完成 3 個關卡，拿到 3 個憑證解開大門</p>
        </div>

        <!-- 3關按鈕 -->
        <div class="stages-grid">
            <!-- 關卡1 -->
            <a href="../示範1_朝代配對/index.html" class="stage-card" id="card-dynasty">
                <div class="stage-info">
                    <span class="stage-emoji">🎴</span>
                    <div class="stage-details">
                        <h3>關卡 1：朝代配對</h3>
                        <p>拖曳歷史事件回到所屬的朝代格</p>
                    </div>
                </div>
                <span class="stage-status" id="status-dynasty">未完成</span>
            </a>

            <!-- 關卡2 -->
            <a href="../示範2_成語填字/index.html" class="stage-card" id="card-idiom">
                <div class="stage-info">
                    <span class="stage-emoji">📝</span>
                    <div class="stage-details">
                        <h3>關卡 2：成語填字</h3>
                        <p>古典宣紙成語填缺字書法蓋章</p>
                    </div>
                </div>
                <span class="stage-status" id="status-idiom">未完成</span>
            </a>

            <!-- 關卡3 -->
            <a href="../示範3_打怪RPG/index.html" class="stage-card" id="card-warrior">
                <div class="stage-info">
                    <span class="stage-emoji">⚔️</span>
                    <div class="stage-details">
                        <h3>關卡 3：打怪 RPG</h3>
                        <p>回答各國英文名稱問答贏得金幣商店</p>
                    </div>
                </div>
                <span class="stage-status" id="status-warrior">未完成</span>
            </a>
        </div>

        <!-- 底部大門動作區 -->
        <div class="gate-action-area">
            <button class="gate-btn" id="openGateBtn">🔒 通關大門</button>
            <div class="cert-summary" id="certSummaryText">目前持有：0 / 3</div>
        </div>

        <!-- 通關大門 Modal (解密拖地) -->
        <div class="modal-overlay" id="gateModal">
            <div class="modal-header">
                <button class="modal-close-btn" id="closeGateBtn">×</button>
                <h2>🔒 朝代與文字之門</h2>
                <p style="font-size:0.75rem; color:#94a3b8; margin-top:2px;">拖曳對應的憑證徽章嵌入凹槽釋放封印</p>
            </div>

            <!-- 插槽區 -->
            <div class="slots-area">
                <div class="slot-wrapper">
                    <span class="slot-label">朝代</span>
                    <div class="socket" id="socket-dynasty" data-expected="cert_dynasty"></div>
                </div>
                <div class="slot-wrapper">
                    <span class="slot-label">成語</span>
                    <div class="socket" id="socket-idiom" data-expected="cert_idiom"></div>
                </div>
                <div class="slot-wrapper">
                    <span class="slot-label">勇者</span>
                    <div class="socket" id="socket-warrior" data-expected="cert_warrior"></div>
                </div>
            </div>

            <!-- 背包區 -->
            <div class="backpack-section">
                <span class="backpack-title">🎒 你的憑證背包</span>
                <div class="badge-pool" id="badgePool">
                    <!-- 由 JS 動態依 localStorage 載入擁有的憑證 -->
                </div>
            </div>
            
            <div style="font-size: 0.7rem; color: #64748b; text-align: center; margin-top:0.4rem;">支援桌機滑鼠與平板觸控拖曳嵌入</div>
        </div>

        <!-- 冒險通關大結果畫面 -->
        <div class="clear-overlay" id="clearOverlay">
            <h2 class="clear-title">🏆 冒險完成！</h2>
            <div class="summary-card">
                <div class="summary-row">
                    <span>關卡完成度：</span>
                    <span class="summary-val" style="color:var(--neon-green)">100% (3/3)</span>
                </div>
                <div class="summary-row">
                    <span>總冒險歷時：</span>
                    <span class="summary-val" id="totalTimeText">00 分 00 秒</span>
                </div>
                <div class="summary-row">
                    <span>評價：</span>
                    <span class="summary-val" style="color:var(--neon-yellow)">國文與歷史大師</span>
                </div>
            </div>
            <button class="gate-btn" id="restartAdventureBtn" style="width: auto; padding: 0.9rem 2.5rem; font-size:1.15rem;">再次冒險</button>
        </div>

    </div>

    <script>
        const cardDynasty = document.getElementById('card-dynasty');
        const cardIdiom = document.getElementById('card-idiom');
        const cardWarrior = document.getElementById('card-warrior');

        const statusDynasty = document.getElementById('status-dynasty');
        const statusIdiom = document.getElementById('status-idiom');
        const statusWarrior = document.getElementById('status-warrior');

        const certSummaryText = document.getElementById('certSummaryText');
        const openGateBtn = document.getElementById('openGateBtn');
        const closeGateBtn = document.getElementById('closeGateBtn');
        const gateModal = document.getElementById('gateModal');
        const badgePool = document.getElementById('badgePool');
        const resetBtn = document.getElementById('resetBtn');
        const clearOverlay = document.getElementById('clearOverlay');
        const totalTimeText = document.getElementById('totalTimeText');
        const restartAdventureBtn = document.getElementById('restartAdventureBtn');
        const mapCabinet = document.getElementById('mapCabinet');

        // 音效控制 (Web Audio API)
        let audioCtx;
        function initAudio() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            } catch (e) {
                console.warn("音訊系統初始化暫緩 (等待使用者手勢互動):", e);
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            switch (type) {
                case 'click':
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.05);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(now + 0.05);
                    break;
                case 'correct':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now); // C5
                    osc.frequency.exponentialRampToValueAtTime(783.99, now + 0.15); // G5
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(now + 0.25);
                    break;
                case 'wrong':
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(160, now);
                    osc.frequency.linearRampToValueAtTime(80, now + 0.15);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(now + 0.15);
                    break;
                case 'complete':
                    // 夢幻慶祝旋律
                    const notes = [523.25, 659.25, 783.99, 880, 1046.50, 1318.51];
                    notes.forEach((freq, idx) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.type = 'sine';
                        o.frequency.setValueAtTime(freq, now + idx * 0.1);
                        g.gain.setValueAtTime(0.08, now + idx * 0.1);
                        g.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.1 + 0.4);
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        o.start();
                        o.stop(now + idx * 0.1 + 0.4);
                    });
                    break;
            }
        }

        // 憑證資料對照
        const CERTS = {
            cert_dynasty: { name: "朝代之印", emoji: "🎴" },
            cert_idiom: { name: "成語之印", emoji: "📝" },
            cert_warrior: { name: "勇者之印", emoji: "⚔️" }
        };

        // 拖曳控制狀態 (Pointer Events)
        let activeDrag = null;
        let originalParent = null;
        let dragOffset = { x: 0, y: 0 };
        let dragStartPos = { x: 0, y: 0 };
        let snappedCount = 0; // 嵌入對的插槽數量

        // 載入大地圖進度
        function loadProgress() {
            initAudio();
            
            // 如果不存在冒險開始時間，則立刻初始化 (開始計時)
            if (!localStorage.getItem('adventure_start')) {
                localStorage.setItem('adventure_start', Date.now().toString());
            }

            let ownedCertsCount = 0;

            // 關卡 1：朝代之印
            if (localStorage.getItem('cert_dynasty') === 'true') {
                cardDynasty.classList.add('completed');
                statusDynasty.textContent = '已完成 ✓';
                ownedCertsCount++;
            } else {
                cardDynasty.classList.remove('completed');
                statusDynasty.textContent = '未完成';
            }

            // 關卡 2：成語之印
            if (localStorage.getItem('cert_idiom') === 'true') {
                cardIdiom.classList.add('completed');
                statusIdiom.textContent = '已完成 ✓';
                ownedCertsCount++;
            } else {
                cardIdiom.classList.remove('completed');
                statusIdiom.textContent = '未完成';
            }

            // 關卡 3：勇者之印
            if (localStorage.getItem('cert_warrior') === 'true') {
                cardWarrior.classList.add('completed');
                statusWarrior.textContent = '已完成 ✓';
                ownedCertsCount++;
            } else {
                cardWarrior.classList.remove('completed');
                statusWarrior.textContent = '未完成';
            }

            certSummaryText.textContent = `目前持有：${ownedCertsCount} / 3`;
        }

        // 初始化/重整大門背包徽章
        function initGateBackpack() {
            badgePool.innerHTML = '';
            snappedCount = 0;

            // 重設插槽狀態
            const sockets = document.querySelectorAll('.socket');
            sockets.forEach(socket => {
                socket.innerHTML = '';
                socket.className = 'socket';
            });

            // 遍歷擁有的憑證
            Object.keys(CERTS).forEach(key => {
                if (localStorage.getItem(key) === 'true') {
                    const badge = document.createElement('div');
                    badge.className = 'cert-badge';
                    badge.id = `badge-${key}`;
                    badge.dataset.certKey = key;
                    badge.innerHTML = `
                        <span class="cert-emoji">${CERTS[key].emoji}</span>
                        <span class="cert-name">${CERTS[key].name}</span>
                    `;

                    // 綁定手動拖曳
                    bindPointerDrag(badge);
                    badgePool.appendChild(badge);
                }
            });

            if (badgePool.children.length === 0) {
                badgePool.innerHTML = '<span style="font-size:0.8rem; color:#64748b;">背包空空如也，快去挑戰關卡吧！</span>';
            }
        }

        // Pointer Events 拖曳徽章實現
        function bindPointerDrag(badge) {
            badge.addEventListener('pointerdown', (e) => {
                if (badge.classList.contains('locked-in')) return;
                initAudio();

                activeDrag = badge;
                originalParent = badge.parentElement;

                const rect = badge.getBoundingClientRect();
                dragStartPos.x = badge.offsetLeft;
                dragStartPos.y = badge.offsetTop;

                dragOffset.x = e.clientX - rect.left;
                dragOffset.y = e.clientY - rect.top;

                badge.style.position = 'fixed';
                badge.style.left = (e.clientX - dragOffset.x) + 'px';
                badge.style.top = (e.clientY - dragOffset.y) + 'px';
                badge.classList.add('dragging');

                badge.setPointerCapture(e.pointerId);
            });

            badge.addEventListener('pointermove', (e) => {
                if (activeDrag !== badge) return;
                badge.style.left = (e.clientX - dragOffset.x) + 'px';
                badge.style.top = (e.clientY - dragOffset.y) + 'px';
            });

            badge.addEventListener('pointerup', (e) => {
                if (activeDrag !== badge) return;
                activeDrag = null;
                badge.releasePointerCapture(e.pointerId);
                badge.classList.remove('dragging');

                // 碰撞檢測是否移到插槽
                const socket = checkSocketCollision(e.clientX, e.clientY);

                if (socket) {
                    const expectedKey = socket.dataset.expected;
                    const badgeKey = badge.dataset.certKey;

                    if (badgeKey === expectedKey && !socket.querySelector('.cert-badge')) {
                        // 拖對了！嵌入鎖定
                        playSound('correct');
                        
                        socket.appendChild(badge);
                        socket.classList.add('correct-snap');
                        
                        // 重置樣式使充滿 socket
                        badge.style.position = 'relative';
                        badge.style.left = '0px';
                        badge.style.top = '0px';
                        badge.classList.add('snapped', 'locked-in');

                        snappedCount++;

                        // 3個凹槽都正確放入
                        if (snappedCount === 3) {
                            setTimeout(completeAdventure, 400);
                        }
                    } else {
                        // 拖錯了！紅閃並退回背包
                        playSound('wrong');
                        socket.classList.add('error-flash');
                        setTimeout(() => socket.classList.remove('error-flash'), 500);

                        resetBadgePosition(badge);
                    }
                } else {
                    // 放手在空白處，直接退回背包
                    resetBadgePosition(badge);
                }
            });
        }

        function checkSocketCollision(clientX, clientY) {
            const sockets = document.querySelectorAll('.socket');
            for (let socket of sockets) {
                const rect = socket.getBoundingClientRect();
                if (clientX >= rect.left && clientX <= rect.right &&
                    clientY >= rect.top && clientY <= rect.bottom) {
                    return socket;
                }
            }
            return null;
        }

        function resetBadgePosition(badge) {
            originalParent.appendChild(badge);
            badge.style.position = 'relative';
            badge.style.left = '0px';
            badge.style.top = '0px';
        }

        // 完成大冒險
        function completeAdventure() {
            playSound('complete');
            
            // 計算歷時時間
            const start = parseInt(localStorage.getItem('adventure_start') || Date.now().toString());
            const elapsed = Date.now() - start;
            
            const minutes = Math.floor(elapsed / 60000);
            const seconds = Math.floor((elapsed % 60000) / 1000);
            
            totalTimeText.textContent = `${minutes} 分 ${seconds} 秒`;
            
            clearOverlay.style.display = 'flex';
        }

        // 開關大門 Modal
        openGateBtn.addEventListener('click', () => {
            playSound('click');
            initGateBackpack();
            gateModal.classList.add('active');
        });

        closeGateBtn.addEventListener('click', () => {
            playSound('click');
            gateModal.classList.remove('active');
        });

        // 清除進度
        resetBtn.addEventListener('click', () => {
            if (confirm('確定要清除所有關卡進度與計時，重新開始冒險嗎？')) {
                localStorage.removeItem('cert_dynasty');
                localStorage.removeItem('cert_idiom');
                localStorage.removeItem('cert_warrior');
                localStorage.removeItem('adventure_start');
                
                loadProgress();
                playSound('click');
            }
        });

        // 再次冒險
        restartAdventureBtn.addEventListener('click', () => {
            localStorage.removeItem('cert_dynasty');
            localStorage.removeItem('cert_idiom');
            localStorage.removeItem('cert_warrior');
            localStorage.removeItem('adventure_start');

            clearOverlay.style.display = 'none';
            gateModal.classList.remove('active');
            
            loadProgress();
            playSound('click');
        });

        // 頁面加載
        window.addEventListener('DOMContentLoaded', () => {
            loadProgress();
        });
    </script>
</body>
</html>
